name: Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker
        run: docker build -t myapp .

      - name: Run container
        run: docker run --rm -p 7860:7860 myapp
